<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecoBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --bg: #0f0f1a;
            --container: #1a1a2e;
            --message-bg: #16213e;
            --text: #e0e0e0;
            --subtext: #888;
            --border: #00c8ff22;
            --input-bg: #0f0f1a;
            --gradient: linear-gradient(135deg, #00c8ff, #7b2ff7);
        }

        .light {
            --bg: #f0f4f8;
            --container: #ffffff;
            --message-bg: #e8edf5;
            --text: #1a1a2e;
            --subtext: #666;
            --border: #00c8ff44;
            --input-bg: #f0f4f8;
        }

        body {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }

        .landing h1 {
            font-size: 48px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .landing p {
            color: var(--subtext);
            font-size: 16px;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .landing button {
            background: var(--gradient);
            border: none;
            border-radius: 30px;
            padding: 14px 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0, 200, 255, 0.3);
        }

        .landing button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 200, 255, 0.5);
        }

        .landing .features {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .landing .feature {
            background: var(--container);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text);
            font-size: 13px;
            width: 130px;
            text-align: center;
        }

        .landing .feature span {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .chat-app {
            display: none;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 700px;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        .chat-app.active {
            display: flex;
        }

        .chat-header {
            background: var(--gradient);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 20px 20px 0 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar-header {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .header-info p {
            color: rgba(255,255,255,0.8);
            font-size: 11px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        .stats-bar {
            background: var(--message-bg);
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
        }

        .stat {
            font-size: 11px;
            color: var(--subtext);
        }

        .stat span {
            color: #00c8ff;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--container);
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #00c8ff33;
            border-radius: 10px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .bot-avatar {
            background: var(--gradient);
        }

        .user-avatar {
            background: #7b2ff7;
            color: white;
            font-weight: 700;
            font-size: 12px;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 75%;
        }

        .message-row.user .message-content {
            align-items: flex-end;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
            position: relative;
        }

        .bot-message {
            background: var(--message-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .user-message {
            background: var(--gradient);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .thinking {
            background: var(--message-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            color: #00c8ff;
        }

        .timestamp {
            font-size: 10px;
            color: var(--subtext);
            padding: 0 4px;
        }

        .dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .dots span {
            width: 7px;
            height: 7px;
            background: #00c8ff;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--subtext);
            font-size: 11px;
            padding: 3px 8px;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--message-bg);
            color: #00c8ff;
            border-color: #00c8ff44;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            gap: 10px;
            background: var(--message-bg);
            border-top: 1px solid var(--border);
            border-radius: 0 0 20px 20px;
        }

        .chat-input input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 12px 18px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        .chat-input input:focus {
            border-color: #00c8ff;
        }

        .chat-input input::placeholder {
            color: var(--subtext);
        }

        .send-btn {
            background: var(--gradient);
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.1); }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .chat-app {
                max-width: 100%;
                max-height: 100vh;
                border-radius: 0;
            }
            .chat-header { border-radius: 0; }
            .chat-input { border-radius: 0; }
            .landing h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

    <!-- LANDING PAGE -->
    <div class="landing" id="landing">
        <h1>🤖 DecoBot</h1>
        <p>A rule-based AI assistant built from scratch by Zeyad Sayed — AI Engineering Student. Fast, smart, and always in control.</p>

        <div class="features">
            <div class="feature">
                <span>⚡</span>
                Instant Rule Matching
            </div>
            <div class="feature">
                <span>🧠</span>
                Groq AI Fallback
            </div>
            <div class="feature">
                <span>💾</span>
                Memory System
            </div>
            <div class="feature">
                <span>🔒</span>
                Secure & Private
            </div>
        </div>

        <button onclick="startChat()">Start Chatting →</button>
    </div>

    <!-- CHAT APP -->
    <div class="chat-app" id="chatApp">

        <div class="chat-header">
            <div class="header-left">
                <div class="bot-avatar-header">🤖</div>
                <div class="header-info">
                    <h1>DecoBot</h1>
                    <p>Online — Ready to help</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
                <button class="header-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat">Messages: <span id="msgCount">0</span></div>
            <div class="stat">Session: <span id="sessionTime">00:00</span></div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input">
            <input
                type="text"
                id="userInput"
                placeholder="Type a message..."
                autocomplete="off"
            />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script>
        let msgCount = 0;
        let sessionStart = Date.now();
        let isDark = true;

        setInterval(() => {
            const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById("sessionTime").textContent = `${mins}:${secs}`;
        }, 1000);

        function startChat() {
            document.getElementById("landing").style.display = "none";
            document.getElementById("chatApp").classList.add("active");
            addBotMessage("Hello! I am DecoBot, your AI assistant. How can I help you today? 👋");
            document.getElementById("userInput").focus();
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle("light", !isDark);
            document.getElementById("themeBtn").textContent = isDark ? "🌙" : "☀️";
        }

        function clearChat() {
            document.getElementById("chatMessages").innerHTML = "";
            msgCount = 0;
            document.getElementById("msgCount").textContent = 0;
            sessionStart = Date.now();
            addBotMessage("Chat cleared! Fresh start. How can I help you? 🔄");
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addBotMessage(text) {
            const messages = document.getElementById("chatMessages");
            const row = document.createElement("div");
            row.classList.add("message-row");
            row.innerHTML = `
                <div class="avatar bot-avatar">🤖</div>
                <div class="message-content">
                    <div class="message bot-message">${text}</div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span class="timestamp">${getTime()}</span>
                        <button class="copy-btn" onclick="copyText(this, \`${text.replace(/`/g, '\\`')}\`)">copy</button>
                    </div>
                </div>
            `;
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
        }

        function addUserMessage(text) {
            const messages = document.getElementById("chatMessages");
            const row = document.createElement("div");
            row.classList.add("message-row", "user");
            row.innerHTML = `
                <div class="avatar user-avatar">You</div>
                <div class="message-content">
                    <div class="message user-message">${text}</div>
                    <span class="timestamp">${getTime()}</span>
                </div>
            `;
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
            msgCount++;
            document.getElementById("msgCount").textContent = msgCount;
        }

        function addThinking() {
            const messages = document.getElementById("chatMessages");
            const row = document.createElement("div");
            row.classList.add("message-row");
            row.id = "thinkingRow";
            row.innerHTML = `
                <div class="avatar bot-avatar">🤖</div>
                <div class="message-content">
                    <div class="message thinking">
                        <div class="dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeThinking() {
            const thinking = document.getElementById("thinkingRow");
            if (thinking) thinking.remove();
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = "copied!";
                btn.style.color = "#00c8ff";
                setTimeout(() => {
                    btn.textContent = "copy";
                    btn.style.color = "";
                }, 2000);
            });
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const btn = document.getElementById("sendBtn");
            const message = input.value.trim();
            if (!message) return;

            addUserMessage(message);
            input.value = "";
            btn.disabled = true;
            addThinking();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                removeThinking();
                addBotMessage(data.reply);
            } catch (error) {
                removeThinking();
                addBotMessage("Sorry, something went wrong. Please try again!");
            }

            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
